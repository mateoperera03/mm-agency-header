<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M&M WEB AGENCY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      overflow-x: hidden;
    }

    .scroll-spacer { height: 500vh; }

    /* ============ HERO ============ */
    .hero {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100vh;
      display: flex;
      align-items: center;
      background: transparent;
      z-index: 1;
      overflow: hidden;
    }

    /* Layout: canvas full screen, texto encima a la izq */
    .hero-layout {
      position: relative;
      width: 100%;
      height: 100%;
    }

    /* ============ TEXTO IZQUIERDA (encima del canvas) ============ */
    .hero-text {
      position: absolute;
      left: 4vw;
      top: 50%;
      transform: translateY(-50%);
      z-index: 20;
      max-width: 420px;
      will-change: transform, opacity;
    }

    .hero-text .line {
      display: block;
      overflow: hidden;
    }

    .hero-text .line-inner {
      display: block;
      transform: translateY(100%);
      animation: revealLine 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .hero-text .line:nth-child(1) .line-inner { animation-delay: 0.2s; }
    .hero-text .line:nth-child(2) .line-inner { animation-delay: 0.35s; }
    .hero-text .line:nth-child(3) .line-inner { animation-delay: 0.5s; }

    @keyframes revealLine {
      to { transform: translateY(0); }
    }

    .hero-text h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(2.2rem, 4.5vw, 5rem);
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -1px;
      color: #4b5563;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.15));
    }

    .hero-text h1 .gold {
      background: linear-gradient(
        135deg,
        #4b5563 0%,
        #9ca3af 25%,
        #374151 50%,
        #6b7280 75%,
        #4b5563 100%
      );
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .hero-text h1 .explota {
      display: inline-block;
      font-style: italic;
      background: linear-gradient(
        135deg,
        #bf953f 0%,
        #fcf6ba 50%,
        #b38728 100%
      );
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s ease-in-out infinite;
      position: relative;
    }

    /* Glow detras de EXPLOTAN */
    .hero-text h1 .explota::after {
      content: 'EXPLOTAN!';
      position: absolute;
      top: 0; left: 0;
      font-style: italic;
      background: linear-gradient(135deg, #bf953f, #fcf6ba);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: blur(20px);
      opacity: 0.3;
      z-index: -1;
    }

    .hero-text .subtitle {
      margin-top: 1.5rem;
      font-size: clamp(0.85rem, 1.2vw, 1.05rem);
      font-weight: 300;
      color: #6b7280;
      letter-spacing: 0.5px;
      line-height: 1.6;
      text-shadow: 0 1px 4px rgba(0,0,0,0.1);
      opacity: 0;
      transform: translateY(15px);
      animation: fadeUp 0.8s ease forwards 0.8s;
    }

    .hero-text .divider {
      width: 50px;
      height: 2px;
      background: linear-gradient(90deg, #bf953f, #fcf6ba, #b38728);
      margin-top: 1.5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1s;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ============ CANVAS DERECHA ============ */
    .canvas-wrapper {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
    }

    canvas {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      filter: drop-shadow(0 20px 60px rgba(0,0,0,0.15));
    }

    /* ============ LOADER ============ */
    .loader {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100vh;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.6s ease;
    }

    .loader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
      letter-spacing: 4px;
    }

    .loader-bar-bg {
      width: 180px;
      height: 2px;
      background: #e5e7eb;
      border-radius: 2px;
      overflow: hidden;
    }

    .loader-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #bf953f, #fcf6ba, #b38728);
      border-radius: 2px;
      transition: width 0.1s;
    }

    /* ============ SCROLL INDICATOR ============ */
    .scroll-indicator {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      will-change: opacity;
    }

    .scroll-indicator span {
      font-size: 0.7rem;
      color: #9ca3af;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .scroll-indicator .mouse {
      width: 22px; height: 34px;
      border: 2px solid #d1d5db;
      border-radius: 11px;
      position: relative;
    }

    .scroll-indicator .mouse::after {
      content: '';
      position: absolute;
      top: 6px; left: 50%;
      transform: translateX(-50%);
      width: 3px; height: 7px;
      background: #d1d5db;
      border-radius: 3px;
      animation: scrollW 1.5s ease-in-out infinite;
    }

    @keyframes scrollW {
      0% { opacity: 1; transform: translateX(-50%) translateY(0); }
      100% { opacity: 0; transform: translateX(-50%) translateY(10px); }
    }

    /* ============ PROGRESS BAR ============ */
    .progress-bar {
      position: fixed;
      top: 0; left: 0;
      height: 2px;
      background: linear-gradient(90deg, #bf953f, #fcf6ba, #b38728);
      z-index: 1000;
      width: 0%;
      will-change: width;
    }

    /* ============ RESPONSIVE ============ */
    @media (max-width: 768px) {
      .hero-layout {
        flex-direction: column;
        justify-content: center;
        padding: 2rem;
        text-align: center;
      }
      .hero-text {
        flex: none;
        padding-right: 0;
        margin-bottom: 2rem;
      }
      .hero-text .divider {
        margin: 1.5rem auto 0;
      }
      .hero-text {
        left: 50%;
        top: auto;
        bottom: 5%;
        transform: translateX(-50%);
        max-width: 90vw;
        text-align: center;
      }
      .hero-text .divider {
        margin: 1rem auto 0;
      }
    }
  </style>
</head>
<body>

  <!-- LOADER -->
  <div class="loader" id="loader">
    <div class="loader-text">M&M WEB AGENCY</div>
    <div class="loader-bar-bg">
      <div class="loader-bar" id="loaderBar"></div>
    </div>
  </div>

  <div class="progress-bar" id="progressBar"></div>

  <!-- HERO -->
  <header class="hero" id="hero">
    <div class="hero-layout">
      <!-- TEXTO IZQUIERDA -->
      <div class="hero-text" id="heroText">
        <h1>
          <span class="line"><span class="line-inner"><span class="gold">Creamos</span></span></span>
          <span class="line"><span class="line-inner"><span class="gold">sitios web que</span></span></span>
          <span class="line"><span class="line-inner"><span class="explota">EXPLOTAN!</span></span></span>
        </h1>
        <p class="subtitle">Desarrollo web premium para marcas que quieren destacar</p>
        <div class="divider"></div>
      </div>

      <!-- CANVAS DERECHA -->
      <div class="canvas-wrapper">
        <canvas id="canvas"></canvas>
      </div>
    </div>
  </header>

  <div class="scroll-indicator" id="scrollIndicator">
    <span>Scroll</span>
    <div class="mouse"></div>
  </div>

  <div class="scroll-spacer"></div>

  <script>
    // ============ CONFIG ============
    const FRAME_COUNT = 121;
    const FRAME_PATH = 'assets/frames/frame_';
    const FRAME_EXT = '.webp';

    // ============ ELEMENTOS ============
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const heroText = document.getElementById('heroText');
    const scrollIndicator = document.getElementById('scrollIndicator');
    const progressBar = document.getElementById('progressBar');
    const loader = document.getElementById('loader');
    const loaderBar = document.getElementById('loaderBar');

    // ============ PRECARGAR FRAMES ============
    const frames = [];
    let loadedCount = 0;
    let allLoaded = false;

    function padNumber(n) {
      return String(n).padStart(4, '0');
    }

    function preloadFrames() {
      for (let i = 1; i <= FRAME_COUNT; i++) {
        const img = new Image();
        img.src = FRAME_PATH + padNumber(i) + FRAME_EXT;

        img.onload = () => {
          loadedCount++;
          const pct = (loadedCount / FRAME_COUNT) * 100;
          loaderBar.style.width = pct + '%';

          if (loadedCount === 1) {
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
          }

          if (loadedCount === FRAME_COUNT) {
            allLoaded = true;
            setTimeout(() => {
              loader.classList.add('hidden');
            }, 300);
          }
        };

        frames.push(img);
      }
    }

    // ============ SCROLL -> FRAME ============
    const TOTAL_SCROLL = () => document.querySelector('.scroll-spacer').offsetHeight - window.innerHeight;

    // Detectar si esta en iframe (Wix)
    const isInIframe = window.self !== window.top;

    let currentFrame = 0;
    let targetFrame = 0;
    let smoothFrame = 0;
    let externalProgress = 0;

    function onScroll() {
      const scrollFraction = window.scrollY / TOTAL_SCROLL();
      targetFrame = Math.min(FRAME_COUNT - 1, Math.floor(scrollFraction * FRAME_COUNT));
    }

    // Escuchar scroll del padre (Wix)
    window.addEventListener('message', (e) => {
      if (e.data && e.data.type === 'scroll') {
        externalProgress = clamp(e.data.progress, 0, 1);
        targetFrame = Math.min(FRAME_COUNT - 1, Math.floor(externalProgress * FRAME_COUNT));
      }
    });

    function clamp(v, min, max) { return Math.min(Math.max(v, min), max); }
    function lerp(a, b, t) { return a + (b - a) * t; }

    function render() {
      if (!allLoaded) {
        requestAnimationFrame(render);
        return;
      }

      // Smooth frame by frame — mas rapido en iframe
      const speed = isInIframe ? 0.3 : 0.1;
      smoothFrame = lerp(smoothFrame, targetFrame, speed);
      if (Math.abs(smoothFrame - targetFrame) < 0.5) smoothFrame = targetFrame;

      const frameIndex = Math.round(clamp(smoothFrame, 0, FRAME_COUNT - 1));

      if (frameIndex !== currentFrame) {
        currentFrame = frameIndex;
        const img = frames[frameIndex];
        if (img && img.complete) {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0);
        }
      }

      const p = isInIframe ? externalProgress : clamp(window.scrollY / TOTAL_SCROLL(), 0, 1);

      // Progress bar
      progressBar.style.width = (p * 100) + '%';

      // Scroll indicator fade
      scrollIndicator.style.opacity = clamp(1 - p * 8, 0, 0.7);

      // Texto: fade out al scrollear
      const textFade = clamp((p - 0.4) / 0.3, 0, 1);
      heroText.style.opacity = 1 - textFade;
      heroText.style.transform = `translateY(${textFade * -40}px)`;

      requestAnimationFrame(render);
    }

    // ============ INIT ============
    if (isInIframe) {
      // En Wix: quitar progress bar, el scroll funciona dentro del iframe
      progressBar.style.display = 'none';
    }
    window.addEventListener('scroll', onScroll, { passive: true });
    preloadFrames();
    render();
  </script>

</body>
</html>
